<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PeopleOS – HR Management</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:#05080f;font-family:'DM Sans',sans-serif;color:#c8c4bb}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#080c14}::-webkit-scrollbar-thumb{background:#1e2633;border-radius:2px}
input::placeholder{color:#2a3444}select option{background:#0d1117;color:#e8e4d9}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.3)}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fi 0.22s ease forwards}
.nav:hover{background:rgba(201,168,76,0.06)!important;color:#e8e4d9!important}
.row:hover td{background:rgba(10,14,22,0.8)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect}=React;

// SVG icon helper
function Svg({d,size=16,col="currentColor",sw=1.8}){
  return(
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
      {(Array.isArray(d)?d:[d]).map((p,i)=><path key={i} d={p}/>)}
    </svg>
  );
}
const IC={
  home:["M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z","M9 22V12h6v10"],
  users:["M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2","M23 21v-2a4 4 0 00-3-3.87","M16 3.13a4 4 0 010 7.75","M9 7a4 4 0 100 8 4 4 0 000-8z"],
  dollar:["M12 1v22","M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"],
  cal:["M8 2v4","M16 2v4","M3 10h18","M21 8a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2h14a2 2 0 002-2V8z"],
  bar:["M18 20V10","M12 20V4","M6 20v-6"],
  bag:["M20 7H4a2 2 0 00-2 2v11a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z","M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"],
  plus:"M12 5v14M5 12h14",
  srch:["M11 19a8 8 0 100-16 8 8 0 000 16z","M21 21l-4.35-4.35"],
  edit:["M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7","M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"],
  del:["M3 6h18","M19 6l-1 14H6L5 6","M8 6V4h8v2"],
  x:"M18 6L6 18M6 6l12 12",
  ok:"M20 6L9 17l-5-5",
  cd:"M6 9l6 6 6-6",
  cr:"M9 18l6-6-6-6",
  up:"M12 19V5M5 12l7-7 7 7",
  dn:"M12 5v14M19 12l-7 7-7-7",
  mail:["M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z","M22 6l-10 7L2 6"],
  ph:"M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-4.92-4.92 19.79 19.79 0 01-3.07-8.67A2 2 0 012.06 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z",
  pin:["M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z","M12 7a3 3 0 100 6 3 3 0 000-6z"],
  uadd:["M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2","M8.5 7a4 4 0 100 8 4 4 0 000-8z","M20 8v6","M23 11h-6"],
  cc:["M1 4h22v16H1z","M1 10h22"],
};

// Data
const DEPTS=["Engineering","Design","Marketing","Sales","HR","Finance","Operations","Legal"];
const STATS=["Active","On Leave","Terminated","Probation"];
const ROLES=["Junior","Mid-level","Senior","Lead","Manager","Director","VP","C-Level"];
const LT=["Annual","Sick","Maternity","Paternity","Unpaid","Bereavement"];
const AC=["#C9A84C","#7C9E8F","#B47A8F","#7A8FB4","#9E8F7A","#8F9E7A"];

const SE=[
  {id:"e1",name:"Thabo Nkosi",    role:"Senior",  dept:"Engineering",sal:420000,st:"Active",   em:"thabo.nkosi@co.za",   ph:"+27 11 555 0101",loc:"Johannesburg, GP",jd:"2021-03-15",av:"TN"},
  {id:"e2",name:"Zanele Dlamini", role:"Director", dept:"Marketing",  sal:580000,st:"Active",   em:"zanele.dlamini@co.za",ph:"+27 21 555 0188",loc:"Cape Town, WC",    jd:"2019-07-01",av:"ZD"},
  {id:"e3",name:"Sipho Mokoena",  role:"Mid-level",dept:"Design",     sal:295000,st:"Active",   em:"sipho.mokoena@co.za", ph:"+27 31 555 0234",loc:"Durban, KZN",      jd:"2022-01-10",av:"SM"},
  {id:"e4",name:"Lerato Khumalo", role:"Lead",     dept:"Engineering",sal:510000,st:"On Leave", em:"lerato.khumalo@co.za",ph:"+27 12 555 0312",loc:"Pretoria, GP",     jd:"2020-05-20",av:"LK"},
  {id:"e5",name:"Nomsa Sithole",  role:"Manager",  dept:"HR",         sal:380000,st:"Active",   em:"nomsa.sithole@co.za", ph:"+27 11 555 0455",loc:"Johannesburg, GP", jd:"2018-11-03",av:"NS"},
  {id:"e6",name:"Bongani Zulu",   role:"Junior",   dept:"Sales",      sal:195000,st:"Probation",em:"bongani.zulu@co.za",  ph:"+27 21 555 0567",loc:"Cape Town, WC",    jd:"2024-02-14",av:"BZ"},
];
const SL=[
  {id:"l1",eid:"e1",type:"Annual",     fr:"2025-04-10",to:"2025-04-17",st:"Pending",  rs:"Family vacation"},
  {id:"l2",eid:"e4",type:"Sick",       fr:"2025-03-20",to:"2025-04-05",st:"Approved", rs:"Medical recovery"},
  {id:"l3",eid:"e3",type:"Bereavement",fr:"2025-03-28",to:"2025-03-31",st:"Approved", rs:"Family bereavement"},
  {id:"l4",eid:"e6",type:"Annual",     fr:"2025-05-01",to:"2025-05-05",st:"Pending",  rs:"Holiday"},
];
const SP=[
  {id:"p1",pd:"March 2025",    dt:"2025-03-28",tot:2380000,cnt:6,st:"Processed"},
  {id:"p2",pd:"February 2025", dt:"2025-02-28",tot:2378000,cnt:6,st:"Processed"},
  {id:"p3",pd:"January 2025",  dt:"2025-01-31",tot:2378000,cnt:6,st:"Processed"},
];

const gc=s=>AC[(s.charCodeAt(0)+(s.charCodeAt(1)||0))%AC.length];
const R=n=>"R "+new Intl.NumberFormat("en-ZA",{maximumFractionDigits:0}).format(n);
const D=d=>d?new Date(d).toLocaleDateString("en-ZA",{month:"short",day:"numeric",year:"numeric"}):"—";
const LS={g:k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};

function Av({s,z=36}){const bg=gc(s);return<div style={{width:z,height:z,borderRadius:"50%",background:bg+"33",border:`1.5px solid ${bg}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:z*.34,fontWeight:700,color:bg,fontFamily:"'Syne',sans-serif",flexShrink:0}}>{s}</div>}

function Bdg({s}){
  const m={Active:{bg:"#1a2e1f",c:"#5fca7e",b:"#2a4a30"},"On Leave":{bg:"#2a2314",c:"#e8b84b",b:"#3d3420"},Terminated:{bg:"#2a1414",c:"#e85b5b",b:"#3d2020"},Probation:{bg:"#14202a",c:"#5ba8e8",b:"#203040"},Pending:{bg:"#2a2314",c:"#e8b84b",b:"#3d3420"},Approved:{bg:"#1a2e1f",c:"#5fca7e",b:"#2a4a30"},Rejected:{bg:"#2a1414",c:"#e85b5b",b:"#3d2020"},Processed:{bg:"#1a2e1f",c:"#5fca7e",b:"#2a4a30"}};
  const x=m[s]||m.Active;
  return<span style={{background:x.bg,color:x.c,border:`1px solid ${x.b}`,padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:600,letterSpacing:"0.04em",whiteSpace:"nowrap"}}>{s}</span>;
}

function Modal({open,onClose,title,children,w=560}){
  if(!open)return null;
  return<div style={{position:"fixed",inset:0,background:"rgba(5,8,15,0.9)",backdropFilter:"blur(8px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={onClose}>
    <div style={{background:"#0d1117",border:"1px solid #1e2633",borderRadius:16,width:"100%",maxWidth:w,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 32px 80px rgba(0,0,0,0.7)"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 24px 0"}}>
        <h3 style={{fontSize:17,fontWeight:700,color:"#e8e4d9",fontFamily:"'Syne',sans-serif"}}>{title}</h3>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#4a5568",padding:4,display:"flex"}}><Svg d={IC.x} size={18}/></button>
      </div>
      <div style={{padding:24}}>{children}</div>
    </div>
  </div>;
}

const LB={display:"block",fontSize:11,fontWeight:600,color:"#7a8899",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6};
const IB={width:"100%",background:"#0a0e16",border:"1px solid #1e2633",borderRadius:8,padding:"10px 14px",color:"#e8e4d9",fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"'DM Sans',sans-serif"};

function FI({label,value,onChange,type="text",ph,req}){
  return<div style={{marginBottom:16}}>
    <label style={LB}>{label}{req&&" *"}</label>
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} style={IB} onFocus={e=>e.target.style.borderColor="#C9A84C44"} onBlur={e=>e.target.style.borderColor="#1e2633"}/>
  </div>;
}
function FS({label,value,onChange,opts}){
  return<div style={{marginBottom:16}}>
    <label style={LB}>{label}</label>
    <div style={{position:"relative"}}>
      <select value={value} onChange={e=>onChange(e.target.value)} style={{...IB,padding:"10px 36px 10px 14px",appearance:"none",cursor:"pointer"}}>
        {opts.map(o=><option key={o}>{o}</option>)}
      </select>
      <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",display:"flex"}}><Svg d={IC.cd} size={14} col="#4a5568"/></span>
    </div>
  </div>;
}

function Stat({icon,label,value,sub,color="#C9A84C",trend}){
  return<div style={{background:"#0d1117",border:"1px solid #1e2633",borderRadius:16,padding:24,position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:0,right:0,width:110,height:110,background:`radial-gradient(circle at 100% 0%,${color}18 0%,transparent 70%)`,borderRadius:"0 16px 0 0"}}/>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
      <div style={{width:40,height:40,borderRadius:10,background:`${color}18`,border:`1px solid ${color}30`,display:"flex",alignItems:"center",justifyContent:"center"}}><Svg d={IC[icon]} size={18} col={color}/></div>
      {trend!==undefined&&<div style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:trend>=0?"#5fca7e":"#e85b5b"}}><Svg d={trend>=0?IC.up:IC.dn} size={12} col={trend>=0?"#5fca7e":"#e85b5b"}/>{Math.abs(trend)}%</div>}
    </div>
    <div style={{fontSize:24,fontWeight:800,color:"#e8e4d9",fontFamily:"'Syne',sans-serif",lineHeight:1,marginBottom:6}}>{value}</div>
    <div style={{fontSize:13,color:"#7a8899"}}>{label}</div>
    {sub&&<div style={{fontSize:11,color,marginTop:4,opacity:.8}}>{sub}</div>}
  </div>;
}

function App(){
  const[tab,setTab]=useState("dashboard");
  const[emps,setEmps]=useState([]);
  const[lvs,setLvs]=useState([]);
  const[pay,setPay]=useState([]);
  const[rdy,setRdy]=useState(false);
  const[em,setEm]=useState(false);
  const[ed,setEd]=useState(null);
  const[ef,setEf]=useState({name:"",role:ROLES[2],dept:DEPTS[0],sal:"",st:STATS[0],em2:"",ph:"",loc:"",jd:""});
  const[lm,setLm]=useState(false);
  const[lf,setLf]=useState({eid:"",type:LT[0],fr:"",to:"",rs:""});
  const[pm,setPm]=useState(false);
  const[vw,setVw]=useState(null);
  const[srch,setSrch]=useState("");
  const[df,setDf]=useState("All");
  const[sf,setSf]=useState("All");

  useEffect(()=>{
    setEmps(LS.g("hr-e")||SE);
    setLvs(LS.g("hr-l")||SL);
    setPay(LS.g("hr-p")||SP);
    setRdy(true);
  },[]);

  const sv=(e,l,p)=>{LS.s("hr-e",e);LS.s("hr-l",l);LS.s("hr-p",p)};
  const EF0=()=>({name:"",role:ROLES[2],dept:DEPTS[0],sal:"",st:STATS[0],em2:"",ph:"",loc:"",jd:new Date().toISOString().split("T")[0]});
  
  function addE(){setEd(null);setEf(EF0());setEm(true)}
  function edE(e){setEd(e);setEf({name:e.name,role:e.role,dept:e.dept,sal:e.sal,st:e.st,em2:e.em,ph:e.ph,loc:e.loc,jd:e.jd});setEm(true);setVw(null)}
  function svE(){
    if(!ef.name||!ef.em2)return;
    const av=ef.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    const n=ed?emps.map(e=>e.id===ed.id?{...e,...ef,sal:+ef.sal,em:ef.em2,av}:e):[...emps,{...ef,id:"e"+Date.now(),sal:+ef.sal,em:ef.em2,av}];
    setEmps(n);sv(n,lvs,pay);setEm(false);
  }
  function dlE(id){const n=emps.filter(e=>e.id!==id);setEmps(n);sv(n,lvs,pay);if(vw?.id===id)setVw(null)}
  function sbL(){
    if(!lf.eid||!lf.fr||!lf.to)return;
    const n=[...lvs,{...lf,id:"l"+Date.now(),st:"Pending"}];
    setLvs(n);sv(emps,n,pay);setLm(false);setLf({eid:"",type:LT[0],fr:"",to:"",rs:""});
  }
  function upL(id,st){const n=lvs.map(l=>l.id===id?{...l,st}:l);setLvs(n);sv(emps,n,pay)}
  function rnP(){
    const act=emps.filter(e=>e.st==="Active"||e.st==="Probation");
    const tot=act.reduce((s,e)=>s+(e.sal/12),0);
    const r={id:"p"+Date.now(),pd:new Date().toLocaleDateString("en-ZA",{month:"long",year:"numeric"}),dt:new Date().toISOString().split("T")[0],tot:Math.round(tot),cnt:act.length,st:"Processed"};
    const n=[r,...pay];setPay(n);sv(emps,lvs,n);setPm(false);
  }

  const tsal=emps.filter(e=>e.st==="Active"||e.st==="Probation").reduce((s,e)=>s+e.sal,0);
  const acnt=emps.filter(e=>e.st==="Active").length;
  const olv=emps.filter(e=>e.st==="On Leave").length;
  const plv=lvs.filter(l=>l.st==="Pending").length;
  const filt=emps.filter(e=>{const q=srch.toLowerCase();return(!q||e.name.toLowerCase().includes(q)||e.em.toLowerCase().includes(q)||e.dept.toLowerCase().includes(q))&&(df==="All"||e.dept===df)&&(sf==="All"||e.st===sf)});
  const dbk=DEPTS.map(d=>({d,n:emps.filter(e=>e.dept===d).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);

  if(!rdy)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#05080f",color:"#C9A84C",fontFamily:"'Syne',sans-serif",fontSize:18}}>Loading…</div>;

  const B=(v="primary")=>({display:"inline-flex",alignItems:"center",gap:7,padding:"9px 18px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,border:"none",transition:"opacity 0.15s",
    ...(v==="primary"?{background:"#C9A84C",color:"#05080f"}:v==="ghost"?{background:"transparent",color:"#7a8899",border:"1px solid #1e2633"}:v==="danger"?{background:"#2a1414",color:"#e85b5b",border:"1px solid #3d2020"}:{background:"#1e2633",color:"#e8e4d9"})});
  const TH={textAlign:"left",padding:"10px 14px",fontSize:11,fontWeight:600,color:"#4a5568",letterSpacing:"0.08em",textTransform:"uppercase",borderBottom:"1px solid #1e2633"};
  const TD={padding:"13px 14px",borderBottom:"1px solid #0a0e16",fontSize:13,verticalAlign:"middle"};

  const NAVS=[["dashboard","home","Dashboard"],["employees","users","Employees"],["payroll","dollar","Payroll"],["leaves","cal","Leave Mgmt"],["analytics","bar","Analytics"]];

  return(
    <div style={{minHeight:"100vh",background:"#05080f",display:"flex"}}>
      {/* Sidebar */}
      <div style={{width:220,background:"#080c14",borderRight:"1px solid #1e2633",display:"flex",flexDirection:"column",flexShrink:0,position:"sticky",top:0,height:"100vh"}}>
        <div style={{padding:"28px 20px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
            <div style={{width:30,height:30,background:"#C9A84C",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}><Svg d={IC.bag} size={14} col="#05080f"/></div>
            <span style={{fontSize:16,fontWeight:800,color:"#e8e4d9",fontFamily:"'Syne',sans-serif"}}>PeopleOS</span>
          </div>
          <div style={{fontSize:10,color:"#2a3a4a",letterSpacing:"0.12em",fontWeight:500,marginLeft:2}}>HR PLATFORM</div>
        </div>
        <div style={{flex:1}}>
          {NAVS.map(([id,ic,lbl])=>(
            <div key={id} className="nav" onClick={()=>setTab(id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 20px",cursor:"pointer",color:tab===id?"#C9A84C":"#7a8899",background:tab===id?"rgba(201,168,76,0.07)":"transparent",borderLeft:`2px solid ${tab===id?"#C9A84C":"transparent"}`,fontSize:13.5,fontWeight:tab===id?600:400,transition:"all 0.15s"}}>
              <Svg d={IC[ic]} size={15} col={tab===id?"#C9A84C":"#7a8899"}/>{lbl}
              {id==="leaves"&&plv>0&&<span style={{marginLeft:"auto",background:"#C9A84C",color:"#05080f",borderRadius:10,fontSize:10,fontWeight:700,padding:"1px 6px"}}>{plv}</span>}
            </div>
          ))}
        </div>
        <div style={{padding:"14px 20px",borderTop:"1px solid #1e2633",display:"flex",alignItems:"center",gap:10}}>
          <Av s="AD" z={30}/><div><div style={{fontSize:12.5,fontWeight:600,color:"#c8c4bb"}}>Admin</div><div style={{fontSize:10,color:"#4a5568"}}>HR Manager</div></div>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto"}}>
        <div className="fade" style={{padding:"32px 32px 80px",maxWidth:1180}}>

          {tab==="dashboard"&&<>
            <div style={{marginBottom:28}}>
              <h1 style={{fontSize:26,fontWeight:800,color:"#e8e4d9",fontFamily:"'Syne',sans-serif",letterSpacing:"-0.02em",marginBottom:4}}>Good day 👋</h1>
              <p style={{fontSize:13,color:"#4a5568"}}>Here's your team overview for today.</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14,marginBottom:28}}>
              <Stat icon="users" label="Total Employees"   value={emps.length}                                     sub={`${acnt} active`}           color="#C9A84C" trend={4}/>
              <Stat icon="dollar" label="Annual Payroll"   value={R(tsal)}                                         sub="Active employees"           color="#7C9E8F" trend={2}/>
              <Stat icon="cal"    label="On Leave"         value={olv}                                             sub={`${plv} pending`}           color="#B47A8F"/>
              <Stat icon="bar"    label="Avg Monthly Salary" value={R(acnt?Math.round(tsal/12/acnt):0)}            sub="Per active employee"        color="#7A8FB4" trend={1}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:20}}>
              <div style={{background:"#0d1117",border:"1px solid #1e2633",borderRadius:16,padding:22}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
                  <h3 style={{fontSize:14,fontWeight:700,color:"#e8e4d9",fontFamily:"'Syne',sans-serif"}}>Team Members</h3>
                  <button style={B("ghost")} onClick={()=>setTab("employees")}>View all <Svg d={IC.cr} size={12}/></button>
                </div>
                {emps.slice(0,5).map(e=>(
                  <div key={e.id} style={{display:"flex",alignItems:"center",gap:11,padding:"9px 0",borderBottom:"1px solid #0a0e16"}}>
                    <Av s={e.av}/><div style={{flex:1}}><div style={{fontSize:13.5,fontWeight:600,color:"#e8e4d9"}}>{e.name}</div><div style={{fontSize:12,color:"#4a5568"}}>{e.role} · {e.dept}</div></div>
                    <Bdg s={e.st}/>
                  </div>
                ))}
              </div>
              <div style={{background:"#0d1117",border:"1px solid #1e2633",borderRadius:16,padding:22}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
                  <h3 style={{fontSize:14,fontWeight:700,color:"#e8e4d9",fontFamily:"'Syne',sans-serif"}}>Leave Requests</h3>
                  <button style={B("ghost")} onClick={()=>setTab("leaves")}>View all <Svg d={IC.cr} size={12}/></button>
                </div>
                {lvs.filter(l=>l.st==="Pending").length===0
                  ?<div style={{textAlign:"center",color:"#4a5568",padding:"20px 0",fontSize:13}}>No pending requests</div>
                  :lvs.filter(l=>l.st==="Pending").slice(0,4).map(l=>{
                    const e=emps.find(x=>x.id===l.eid);
                    return<div key={l.id} style={{display:"flex",alignItems:"center",gap:11,padding:"9px 0",borderBottom:"1px solid #0a0e16"}}>
                      <Av s={e?.av||"??"}/><div style={{flex:1}}><div style={{fontSize:13.5,fontWeight:600,color:"#e8e4d9"}}>{e?.name||"Unknown"}</div><div style={{fontSize:12,color:"#4a5568"}}>{l.type} · {D(l.fr)}</div></div>
                      <div style={{display:"flex",gap:5}}>
                        <button style={{background:"#1a2e1f",border:"none",borderRadius:6,padding:"4px 8px",cursor:"pointer",color:"#5fca7e",display:"flex"}} onClick={()=>upL(l.id,"Approved")}><Svg d={IC.ok} size={13}/></button>
                        <button style={{background:"#2a1414",border:"none",borderRadius:6,padding:"4px 8px",cursor:"pointer",color:"#e85b5b",display:"flex"}} onClick={()=>upL(l.id,"Rejected")}><Svg d={IC.x} size={13}/></button>
                      </div>
                    </div>;
                  })
                }
              </div>
            </div>
            <div style={{background:"#0d1117",border:"1px solid #1e2633",borderRadius:16,padding:22}}>
              <h3 style={{fontSize:14,fontWeight:700,color:"#e8e4d9",fontFamily:"'Syne',sans-serif",marginBottom:18}}>Headcount by Department</h3>
              {dbk.map(({d,n},i)=>(
                <div key={d} style={{display:"flex",alignItems:"center",gap:12,marginBottom:11}}>
                  <span style={{width:90,fontSize:12,color:"#7a8899",flexShrink:0}}>{d}</span>
                  <div style={{flex:1,background:"#0a0e16",borderRadius:4,height:6,overflow:"hidden"}}><div style={{width:`${(n/emps.length)*100}%`,height:"100%",background:AC[i%AC.length],borderRadius:4}}/></div>
                  <span style={{width:20,fontSize:12,fontWeight:700,color:"#e8e4d9",textAlign:"right"}}>{n}</span>
                </div>
              ))}
            </div>
          </>}

          {tab==="employees"&&<>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:22}}>
              <div><h1 style={{fontSize:22,fontWeight:800,color:"#e8e4d9",fontFamily:"'Syne',sans-serif",marginBottom:4}}>Employees</h1><p style={{fontSize:13,color:"#4a5568"}}>{emps.length} team members · {new Set(emps.map(e=>e.dept)).size} departments</p></div>
              <button style={B()} onClick={addE}><Svg d={IC.uadd} size={14} col="#05080f"/> Add Employee</button>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
              <div style={{position:"relative",flex:1,minWidth:180}}>
                <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",display:"flex"}}><Svg d={IC.srch} size={14} col="#4a5568"/></span>
                <input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Search employees…" style={{...IB,paddingLeft:34}}/>
              </div>
              {[[df,setDf,["All",...DEPTS]],[sf,setSf,["All",...STATS]]].map(([v,set,opts],i)=>(
                <div key={i} style={{position:"relative"}}>
                  <select value={v} onChange={e=>set(e.target.value)} style={{...IB,padding:"10px 32px 10px 12px",appearance:"none",cursor:"pointer",width:"auto"}}>
                    {opts.map(o=><option key={o}>{o}</option>)}
                  </select>
                  <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",display:"flex"}}><Svg d={IC.cd} size={12} col="#4a5568"/></span>
                </div>
              ))}
            </div>
            <div style={{background:"#0d1117",border:"1px solid #1e2633",borderRadius:16,overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:"#080c14"}}>{["Employee","Department","Role","Annual Salary","Status","Joined",""].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                <tbody>
                  {filt.length===0&&<tr><td colSpan={7} style={{...TD,textAlign:"center",color:"#4a5568",padding:40}}>No employees found</td></tr>}
                  {filt.map(e=>(
                    <tr key={e.id} className="row" style={{cursor:"pointer"}} onClick={()=>setVw(e)}>
                      <td style={TD}><div style={{display:"flex",alignItems:"center",gap:11}}><Av s={e.av}/><div><div style={{fontWeight:600,color:"#e8e4d9"}}>{e.name}</div><div style={{fontSize:11,color:"#4a5568"}}>{e.em}</div></div></div></td>
                      <td style={TD}>{e.dept}</td><td style={TD}>{e.role}</td>
                      <td style={{...TD,fontWeight:600,color:"#C9A84C"}}>{R(e.sal)}</td>
                      <td style={TD}><Bdg s={e.st}/></td>
                      <td style={{...TD,color:"#4a5568"}}>{D(e.jd)}</td>
                      <td style={TD} onClick={ev=>ev.stopPropagation()}>
                        <div style={{display:"flex",gap:4}}>
                          <button style={{background:"none",border:"none",cursor:"pointer",color:"#4a5568",padding:5,display:"flex"}} onClick={()=>edE(e)}><Svg d={IC.edit} size={14}/></button>
                          <button style={{background:"none",border:"none",cursor:"pointer",color:"#4a5568",padding:5,display:"flex"}} onClick={()=>dlE(e.id)}><Svg d={IC.del} size={14}/></button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </>}

          {tab==="payroll"&&<>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:22}}>
              <div><h1 style={{fontSize:22,fontWeight:800,color:"#e8e4d9",fontFamily:"'Syne',sans-serif",marginBottom:4}}>Payroll</h1><p style={{fontSize:13,color:"#4a5568"}}>Monthly salary management & payroll history</p></div>
              <button style={B()} onClick={()=>setPm(true)}><Svg d={IC.cc} size={14} col="#05080f"/> Run Payroll</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:14,marginBottom:24}}>
              <Stat icon="dollar" label="Monthly Payroll"    value={R(Math.round(tsal/12))} color="#C9A84C"/>
              <Stat icon="users"  label="Active on Payroll"  value={acnt+emps.filter(e=>e.st==="Probation").length} color="#7C9E8F"/>
              <Stat icon="bar"    label="Avg Monthly Salary" value={R(acnt?Math.round(tsal/12/acnt):0)} color="#7A8FB4"/>
            </div>
            <div style={{background:"#0d1117",border:"1px solid #1e2633",borderRadius:16,overflow:"hidden",marginBottom:22}}>
              <div style={{padding:"15px 20px",borderBottom:"1px solid #1e2633"}}><h3 style={{fontSize:14,fontWeight:700,color:"#e8e4d9",fontFamily:"'Syne',sans-serif"}}>Salary Overview</h3></div>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:"#080c14"}}>{["Employee","Department","Annual Salary","Monthly","Status"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                <tbody>{emps.map(e=>(
                  <tr key={e.id} className="row">
                    <td style={TD}><div style={{display:"flex",alignItems:"center",gap:10}}><Av s={e.av} z={30}/><div><div style={{fontWeight:600,color:"#e8e4d9",fontSize:13}}>{e.name}</div><div style={{fontSize:11,color:"#4a5568"}}>{e.role}</div></div></div></td>
                    <td style={TD}>{e.dept}</td>
                    <td style={{...TD,fontWeight:700,color:"#C9A84C"}}>{R(e.sal)}</td>
                    <td style={{...TD,color:"#7a8899"}}>{R(Math.round(e.sal/12))}</td>
                    <td style={TD}><Bdg s={e.st}/></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <div style={{background:"#0d1117",border:"1px solid #1e2633",borderRadius:16,overflow:"hidden"}}>
              <div style={{padding:"15px 20px",borderBottom:"1px solid #1e2633"}}><h3 style={{fontSize:14,fontWeight:700,color:"#e8e4d9",fontFamily:"'Syne',sans-serif"}}>Payroll History</h3></div>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:"#080c14"}}>{["Period","Processed","Employees","Total Amount","Status"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                <tbody>{pay.map(r=>(
                  <tr key={r.id} className="row">
                    <td style={{...TD,fontWeight:600,color:"#e8e4d9"}}>{r.pd}</td>
                    <td style={{...TD,color:"#4a5568"}}>{D(r.dt)}</td>
                    <td style={TD}>{r.cnt}</td>
                    <td style={{...TD,fontWeight:700,color:"#C9A84C"}}>{R(r.tot)}</td>
                    <td style={TD}><Bdg s={r.st}/></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </>}

          {tab==="leaves"&&<>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:22}}>
              <div><h1 style={{fontSize:22,fontWeight:800,color:"#e8e4d9",fontFamily:"'Syne',sans-serif",marginBottom:4}}>Leave Management</h1><p style={{fontSize:13,color:"#4a5568"}}>{plv} pending requests need attention</p></div>
              <button style={B()} onClick={()=>setLm(true)}><Svg d={IC.plus} size={14} col="#05080f"/> Request Leave</button>
            </div>
            <div style={{background:"#0d1117",border:"1px solid #1e2633",borderRadius:16,overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:"#080c14"}}>{["Employee","Type","From","To","Reason","Status","Actions"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                <tbody>
                  {lvs.length===0&&<tr><td colSpan={7} style={{...TD,textAlign:"center",color:"#4a5568",padding:40}}>No leave requests</td></tr>}
                  {lvs.map(l=>{
                    const e=emps.find(x=>x.id===l.eid);
                    return<tr key={l.id} className="row">
                      <td style={TD}><div style={{display:"flex",alignItems:"center",gap:9}}><Av s={e?.av||"??"} z={30}/><span style={{fontWeight:600,color:"#e8e4d9",fontSize:13}}>{e?.name||"Unknown"}</span></div></td>
                      <td style={TD}>{l.type}</td>
                      <td style={{...TD,color:"#7a8899"}}>{D(l.fr)}</td>
                      <td style={{...TD,color:"#7a8899"}}>{D(l.to)}</td>
                      <td style={{...TD,color:"#4a5568",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.rs}</td>
                      <td style={TD}><Bdg s={l.st}/></td>
                      <td style={TD}>{l.st==="Pending"&&<div style={{display:"flex",gap:6}}>
                        <button style={{background:"#1a2e1f",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",color:"#5fca7e",display:"flex",alignItems:"center",gap:4,fontSize:12,fontWeight:600}} onClick={()=>upL(l.id,"Approved")}><Svg d={IC.ok} size={12}/>Approve</button>
                        <button style={{background:"#2a1414",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",color:"#e85b5b",display:"flex",alignItems:"center",gap:4,fontSize:12,fontWeight:600}} onClick={()=>upL(l.id,"Rejected")}><Svg d={IC.x} size={12}/>Reject</button>
                      </div>}</td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
          </>}

          {tab==="analytics"&&<>
            <h1 style={{fontSize:22,fontWeight:800,color:"#e8e4d9",fontFamily:"'Syne',sans-serif",marginBottom:4}}>Analytics</h1>
            <p style={{fontSize:13,color:"#4a5568",marginBottom:26}}>Workforce insights and salary metrics</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18,marginBottom:20}}>
              <div style={{background:"#0d1117",border:"1px solid #1e2633",borderRadius:16,padding:22}}>
                <h3 style={{fontSize:14,fontWeight:700,color:"#e8e4d9",fontFamily:"'Syne',sans-serif",marginBottom:18}}>Workforce Status</h3>
                {STATS.map((s,i)=>{const n=emps.filter(e=>e.st===s).length;const p=emps.length?(n/emps.length)*100:0;return<div key={s} style={{marginBottom:13}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:12.5,color:"#7a8899"}}>{s}</span><span style={{fontSize:12.5,fontWeight:600,color:"#e8e4d9"}}>{n} <span style={{color:"#4a5568",fontWeight:400}}>({p.toFixed(0)}%)</span></span></div>
                  <div style={{background:"#0a0e16",borderRadius:4,height:6}}><div style={{width:`${p}%`,height:"100%",background:AC[i%AC.length],borderRadius:4}}/></div>
                </div>;})}
              </div>
              <div style={{background:"#0d1117",border:"1px solid #1e2633",borderRadius:16,padding:22}}>
                <h3 style={{fontSize:14,fontWeight:700,color:"#e8e4d9",fontFamily:"'Syne',sans-serif",marginBottom:18}}>Avg Salary by Department</h3>
                {dbk.map(({d},i)=>{const ee=emps.filter(e=>e.dept===d);const avg=ee.length?ee.reduce((s,e)=>s+e.sal,0)/ee.length:0;const mx=Math.max(...DEPTS.map(x=>{const xe=emps.filter(e=>e.dept===x);return xe.length?xe.reduce((s,e)=>s+e.sal,0)/xe.length:0}));return<div key={d} style={{marginBottom:13}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:12.5,color:"#7a8899"}}>{d}</span><span style={{fontSize:12.5,fontWeight:600,color:"#C9A84C"}}>{R(Math.round(avg))}</span></div>
                  <div style={{background:"#0a0e16",borderRadius:4,height:6}}><div style={{width:`${mx?(avg/mx)*100:0}%`,height:"100%",background:AC[i%AC.length],borderRadius:4}}/></div>
                </div>;})}
              </div>
            </div>
            <div style={{background:"#0d1117",border:"1px solid #1e2633",borderRadius:16,padding:22}}>
              <h3 style={{fontSize:14,fontWeight:700,color:"#e8e4d9",fontFamily:"'Syne',sans-serif",marginBottom:18}}>Headcount by Role</h3>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10}}>
                {ROLES.map((r,i)=>{const n=emps.filter(e=>e.role===r).length;return<div key={r} style={{background:"#080c14",border:"1px solid #1e2633",borderRadius:12,padding:"14px 10px",textAlign:"center"}}><div style={{fontSize:24,fontWeight:800,color:AC[i%AC.length],fontFamily:"'Syne',sans-serif",lineHeight:1,marginBottom:4}}>{n}</div><div style={{fontSize:11,color:"#4a5568"}}>{r}</div></div>;})}
              </div>
            </div>
          </>}

        </div>
      </div>

      {/* MODALS */}
      <Modal open={em} onClose={()=>setEm(false)} title={ed?"Edit Employee":"Add New Employee"} w={580}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
          <div style={{gridColumn:"1/-1"}}><FI label="Full Name" value={ef.name} onChange={v=>setEf(f=>({...f,name:v}))} req ph="Thabo Dlamini"/></div>
          <FI label="Email"  value={ef.em2}  onChange={v=>setEf(f=>({...f,em2:v}))}  req ph="thabo@company.co.za"/>
          <FI label="Phone"  value={ef.ph}   onChange={v=>setEf(f=>({...f,ph:v}))}   ph="+27 11 555 0100"/>
          <FS label="Department" value={ef.dept} onChange={v=>setEf(f=>({...f,dept:v}))} opts={DEPTS}/>
          <FS label="Role Level" value={ef.role} onChange={v=>setEf(f=>({...f,role:v}))} opts={ROLES}/>
          <FI label="Annual Salary (R)" value={ef.sal} onChange={v=>setEf(f=>({...f,sal:v}))} type="number" ph="350000" req/>
          <FS label="Status"    value={ef.st}  onChange={v=>setEf(f=>({...f,st:v}))}  opts={STATS}/>
          <FI label="Location"  value={ef.loc} onChange={v=>setEf(f=>({...f,loc:v}))} ph="City, Province"/>
          <FI label="Join Date" value={ef.jd}  onChange={v=>setEf(f=>({...f,jd:v}))} type="date"/>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
          <button style={B("ghost")} onClick={()=>setEm(false)}>Cancel</button>
          <button style={B()} onClick={svE}><Svg d={IC.ok} size={14} col="#05080f"/> {ed?"Save Changes":"Add Employee"}</button>
        </div>
      </Modal>

      <Modal open={lm} onClose={()=>setLm(false)} title="Request Leave" w={480}>
        <div style={{marginBottom:16}}>
          <label style={LB}>Employee *</label>
          <div style={{position:"relative"}}>
            <select value={lf.eid} onChange={e=>setLf(f=>({...f,eid:e.target.value}))} style={{...IB,padding:"10px 36px 10px 14px",appearance:"none",cursor:"pointer",color:lf.eid?"#e8e4d9":"#4a5568"}}>
              <option value="">Select employee…</option>
              {emps.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
            <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",display:"flex"}}><Svg d={IC.cd} size={14} col="#4a5568"/></span>
          </div>
        </div>
        <FS label="Leave Type" value={lf.type} onChange={v=>setLf(f=>({...f,type:v}))} opts={LT}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <FI label="From" value={lf.fr} onChange={v=>setLf(f=>({...f,fr:v}))} type="date" req/>
          <FI label="To"   value={lf.to} onChange={v=>setLf(f=>({...f,to:v}))} type="date" req/>
        </div>
        <FI label="Reason" value={lf.rs} onChange={v=>setLf(f=>({...f,rs:v}))} ph="Brief description…"/>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
          <button style={B("ghost")} onClick={()=>setLm(false)}>Cancel</button>
          <button style={B()} onClick={sbL}><Svg d={IC.ok} size={14} col="#05080f"/> Submit Request</button>
        </div>
      </Modal>

      <Modal open={pm} onClose={()=>setPm(false)} title="Run Payroll" w={440}>
        <div style={{textAlign:"center",padding:"8px 0 20px"}}>
          <div style={{width:60,height:60,background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
            <Svg d={IC.dollar} size={24} col="#C9A84C"/>
          </div>
          <h3 style={{fontSize:18,fontWeight:700,color:"#e8e4d9",fontFamily:"'Syne',sans-serif",marginBottom:8}}>Process Payroll Run</h3>
          <p style={{fontSize:13.5,color:"#4a5568",lineHeight:1.6,marginBottom:16}}>
            Processing for <strong style={{color:"#e8e4d9"}}>{emps.filter(e=>e.st==="Active"||e.st==="Probation").length} employees</strong> — total <strong style={{color:"#C9A84C"}}>{R(Math.round(tsal/12))}</strong> this month.
          </p>
          <div style={{background:"#0a0e16",border:"1px solid #1e2633",borderRadius:10,padding:"12px 16px",marginBottom:16,textAlign:"left"}}>
            {emps.filter(e=>e.st==="Active"||e.st==="Probation").map(e=>(
              <div key={e.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:12.5,color:"#7a8899",borderBottom:"1px solid #1e263333"}}>
                <span>{e.name}</span><span style={{color:"#C9A84C",fontWeight:600}}>{R(Math.round(e.sal/12))}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button style={B("ghost")} onClick={()=>setPm(false)}>Cancel</button>
          <button style={B()} onClick={rnP}><Svg d={IC.ok} size={14} col="#05080f"/> Confirm &amp; Process</button>
        </div>
      </Modal>

      <Modal open={!!vw} onClose={()=>setVw(null)} title="Employee Profile" w={500}>
        {vw&&<div>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:22,padding:16,background:"#080c14",borderRadius:12,border:"1px solid #1e2633"}}>
            <Av s={vw.av} z={56}/><div><h3 style={{fontSize:20,fontWeight:800,color:"#e8e4d9",fontFamily:"'Syne',sans-serif",marginBottom:4}}>{vw.name}</h3><div style={{fontSize:13,color:"#7a8899",marginBottom:6}}>{vw.role} · {vw.dept}</div><Bdg s={vw.st}/></div>
          </div>
          <div style={{display:"grid",gap:9}}>
            {[["mail","Email",vw.em],["ph","Phone",vw.ph],["pin","Location",vw.loc],["dollar","Salary",R(vw.sal)],["cal","Joined",D(vw.jd)]].map(([ic,lbl,val])=>(
              <div key={lbl} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"#080c14",borderRadius:10,border:"1px solid #1e2633"}}>
                <Svg d={IC[ic]} size={14} col="#C9A84C"/>
                <span style={{fontSize:12,color:"#4a5568",width:60}}>{lbl}</span>
                <span style={{fontSize:13.5,color:"#e8e4d9",fontWeight:500}}>{val}</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:18}}>
            <button style={B("danger")} onClick={()=>dlE(vw.id)}><Svg d={IC.del} size={13}/> Delete</button>
            <button style={B()} onClick={()=>edE(vw)}><Svg d={IC.edit} size={13} col="#05080f"/> Edit</button>
          </div>
        </div>}
      </Modal>

    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
